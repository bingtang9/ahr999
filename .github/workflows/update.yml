name: update-btc-data

on:
  schedule:
    # Daily at 00:15 UTC, shortly after the daily kline closes.
    - cron: "15 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-btc-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch BTC daily data from Binance
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/btc_daily.json)" ]; then
            git add data/btc_daily.json
            git commit -m "data: daily BTC update ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
